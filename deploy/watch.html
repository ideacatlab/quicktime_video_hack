<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ALI · QuickTime Live</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13"></script>
<style>
body{background:#000;margin:0;display:flex;flex-direction:column;align-items:center;font-family:system-ui,sans-serif;color:#eee;padding:8px}
.wrap{position:relative;max-width:430px;width:96vw}
video{width:100%;background:#111;border-radius:10px;display:block}
.live{position:absolute;top:10px;left:10px;background:#e00;color:#fff;font-weight:700;font-size:12px;padding:3px 9px;border-radius:5px;letter-spacing:.5px;display:flex;align-items:center;gap:5px}
.live::before{content:"";width:7px;height:7px;background:#fff;border-radius:50%;animation:b 1s infinite}
@keyframes b{50%{opacity:.3}}
.bar{display:flex;gap:10px;margin-top:12px}
button{padding:12px 22px;font-size:15px;font-weight:700;border:0;border-radius:9px;cursor:pointer;color:#fff}
#snd{background:#16a34a}#snd.on{background:#2447d6}#fs{background:#2447d6}
#st{opacity:.6;font-size:12px;margin-top:8px}
</style></head><body>
<div class="wrap">
  <video id="v" autoplay playsinline muted></video>
  <div class="live" id="badge" style="display:none">LIVE</div>
</div>
<audio id="a" autoplay muted></audio>
<div class="bar">
  <button id="snd">🔊 Tap for sound</button>
  <button id="fs">⛶ Fullscreen</button>
</div>
<p id="st">connecting…</p>
<script>
var u=new URLSearchParams(location.search).get('u');
var v=document.getElementById('v'), a=document.getElementById('a'), st=document.getElementById('st'), badge=document.getElementById('badge');
var HCFG={liveSyncDurationCount:3,liveMaxLatencyDurationCount:10,lowLatencyMode:true,backBufferLength:0,liveDurationInfinity:true};
function attach(el,url,onlive){
  if(window.Hls && Hls.isSupported()){
    var h=new Hls(HCFG); h.loadSource(url); h.attachMedia(el);
    h.on(Hls.Events.MANIFEST_PARSED,function(){el.play().catch(function(){});});
    h.on(Hls.Events.ERROR,function(e,d){if(d&&d.fatal){try{h.startLoad();}catch(x){} setTimeout(function(){try{h.loadSource(url);h.startLoad();}catch(x){}},2000);}});
    el._hls=h; el._url=url;
  } else if(el.canPlayType('application/vnd.apple.mpegurl')){ el.src=url; }
}
function keepLive(el){ var h=el._hls; if(h && h.liveSyncPosition!=null && el.buffered.length){ var lag=h.liveSyncPosition-el.currentTime; if(lag>6||lag< -1) try{el.currentTime=h.liveSyncPosition;}catch(e){} } }
attach(v,'/'+u+'/stream.m3u8');
attach(a,'/'+u+'/audio.m3u8');
v.addEventListener('playing',function(){st.textContent='● live';badge.style.display='flex';});
v.addEventListener('waiting',function(){keepLive(v);});
setInterval(function(){keepLive(v);keepLive(a);},2000);
document.getElementById('snd').onclick=function(){
  a.muted=false; a.volume=1; a.play().catch(function(){});
  keepLive(a);
  this.textContent='🔊 Sound ON'; this.classList.add('on');
};
document.getElementById('fs').onclick=function(){ if(v.requestFullscreen) v.requestFullscreen(); };
</script></body></html>
